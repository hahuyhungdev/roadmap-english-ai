name: Deploy Next.js to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      APP_DIR: /var/www/marcus-app/roadmap-english
      PM2_APP_NAME: roadmap-english
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit --pretty false

      - name: Build
        run: pnpm run build

      - name: Package standalone build
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cp -r content .next/standalone/content
          mkdir -p .next/standalone/src/lib
          cp src/lib/schema.ts .next/standalone/src/lib/schema.ts
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: deploy.tar.gz
          target: /tmp

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          SONIOX_API_KEY: ${{ secrets.SONIOX_API_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          envs: DEEPSEEK_API_KEY,SUPADATA_API_KEY,SONIOX_API_KEY,GOOGLE_TTS_API_KEY,DATABASE_URL
          script: |
            set -e

            for var in DEEPSEEK_API_KEY SUPADATA_API_KEY SONIOX_API_KEY GOOGLE_TTS_API_KEY DATABASE_URL; do
              if [ -z "$(printenv "$var")" ]; then
                echo "Missing required secret: $var"
                exit 1
              fi
            done

            # Ensure legacy systemd service does not fight PM2 for port 3000.
            if systemctl list-unit-files | grep -q '^roadmap-english.service'; then
              systemctl stop roadmap-english.service || true
              systemctl disable roadmap-english.service || true
            fi

            # Clean stale standalone process that can keep port 3000 occupied.
            pkill -f "next-server" || true

            # Clean previous build and extract new one
            rm -rf "$APP_DIR"
            mkdir -p "$APP_DIR"
            tar -xzf /tmp/deploy.tar.gz -C "$APP_DIR"
            rm -f /tmp/deploy.tar.gz

            # Write .env.local from secrets
            printf '%s\n' \
              "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY" \
              "SUPADATA_API_KEY=$SUPADATA_API_KEY" \
              "SONIOX_API_KEY=$SONIOX_API_KEY" \
              "GOOGLE_TTS_API_KEY=$GOOGLE_TTS_API_KEY" \
              "DATABASE_URL=$DATABASE_URL" \
              > "$APP_DIR/.env.local"

            # Sync DB schema on VPS (runner IP may not be allowed to access DB)
            cd "$APP_DIR"

            echo "DB preflight: checking target and connectivity..."
            node -e "const u=new URL(process.env.DATABASE_URL); const db=u.pathname.replace(/^\//,''); console.log('DB target:', u.hostname + ':' + (u.port || '5432') + '/' + db)"

            # Ensure DB drivers are available for both schema sync and runtime.
            # This fixes occasional standalone environments where pg is not traced.
            # Install runtime deps in an isolated folder to avoid npm resolving Next peer deps.
            RUNTIME_DEPS_DIR="$APP_DIR/.runtime-deps"
            mkdir -p "$RUNTIME_DEPS_DIR"
            if [ ! -f "$RUNTIME_DEPS_DIR/package.json" ]; then
              printf '{"name":"runtime-deps","private":true}' > "$RUNTIME_DEPS_DIR/package.json"
            fi

            if ! NODE_PATH="$RUNTIME_DEPS_DIR/node_modules" node -e "require('module').Module._initPaths(); require.resolve('pg'); require.resolve('drizzle-orm/node-postgres'); require.resolve('drizzle-kit/bin.cjs')" >/dev/null 2>&1; then
              echo "Installing missing DB runtime dependencies (isolated)..."
              npm --prefix "$RUNTIME_DEPS_DIR" install --omit=dev --no-package-lock --legacy-peer-deps pg@8.20.0 drizzle-orm@0.45.2 drizzle-kit@0.31.10 >/dev/null
            fi

            export NODE_PATH="$RUNTIME_DEPS_DIR/node_modules${NODE_PATH:+:$NODE_PATH}"
            node -e "const {Pool}=require('pg'); const p=new Pool({connectionString: process.env.DATABASE_URL}); p.query('select 1 as ok').then(()=>{console.log('DB preflight passed')}).catch((e)=>{console.error('DB preflight failed:', e.message); process.exit(1)}).finally(()=>p.end())"

            "$RUNTIME_DEPS_DIR/node_modules/.bin/drizzle-kit" push \
              --dialect postgresql \
              --schema ./src/lib/schema.ts \
              --url "$DATABASE_URL"

            # Stop any old process names that may hold port 3000
            pm2 delete roadmap-english-ai 2>/dev/null || true
            pm2 delete roadmap-ai 2>/dev/null || true

            # Zero-downtime rolling reload (cluster mode):
            # if already running → reload workers one-by-one (no downtime)
            # if first deploy   → start fresh with 2 cluster workers
            if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
              pm2 reload "$PM2_APP_NAME" --update-env
            else
              NODE_PATH="$NODE_PATH" pm2 start server.js --name "$PM2_APP_NAME" -i 2
            fi
            pm2 save

            sleep 2

            # Smoke test
            for i in 1 2 3 4 5; do
              status_code=$(curl -sS -o /tmp/roadmap-health.out -w "%{http_code}" "http://127.0.0.1:3000/")
              if [ "$status_code" = "200" ]; then
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "Health check failed: HTTP $status_code"
                head -c 500 /tmp/roadmap-health.out || true
                exit 1
              fi
              sleep 2
            done

            new_phase_code=$(curl -sS -o /tmp/roadmap-phase.out -w "%{http_code}" "http://127.0.0.1:3000/phase/phase-3-the-strategic-psychological-engine")
            if [ "$new_phase_code" != "200" ]; then
              echo "Phase route check failed: HTTP $new_phase_code"
              head -c 500 /tmp/roadmap-phase.out || true
              exit 1
            fi

            redirect_code=$(curl -sS -o /tmp/roadmap-legacy-redirect.out -w "%{http_code}" "http://127.0.0.1:3000/phase/phase-3-practical-discussion")
            if [ "$redirect_code" != "307" ] && [ "$redirect_code" != "308" ]; then
              echo "Legacy redirect check failed: HTTP $redirect_code"
              head -c 500 /tmp/roadmap-legacy-redirect.out || true
              exit 1
            fi

            note_status_code=$(curl -sS -o /tmp/roadmap-note-health.out -w "%{http_code}" "http://127.0.0.1:3000/api/lesson-notes?sessionSlug=session-01")
            if [ "$note_status_code" != "200" ]; then
              echo "Lesson note API check failed: HTTP $note_status_code"
              head -c 500 /tmp/roadmap-note-health.out || true
              exit 1
            fi

            echo "Deploy complete"
            pm2 status "$PM2_APP_NAME"
