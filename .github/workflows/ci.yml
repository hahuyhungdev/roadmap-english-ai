name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit --pretty false

      - name: Build
        run: pnpm run build

      - name: Verify standalone/static integrity
        run: |
          set -euo pipefail
          test -f .next/standalone/server.js
          test -d .next/static
          find .next/static -type f | head -n 1 >/dev/null
          find .next/static -type f -name "*.css" | head -n 1 >/dev/null
